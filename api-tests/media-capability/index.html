<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decoder Power Efficiency Test</title>
</head>
<body bgcolor="white">
    <div id="logDiv"></div>

<script>
    function log(msg) {
        logDiv.innerHTML += msg + "<br>";
    }

    function logSeparator() {
        logDiv.innerHTML += "<hr>"; // Adds a horizontal line as a separator
    }

    if ('mediaCapabilities' in navigator) {
        const configurations = [
            {
                type: 'webrtc',
                video: {
                    contentType: 'video/H265',
                    width: 3840,
                    height: 2160,
                    bitrate: 500000,
                    framerate: 120,
                },
            },
	    {
                type: 'webrtc',
                video: {
                    contentType: 'video/H265',
                    width: 3840,
                    height: 2160,
                    bitrate: 5000000,
                    framerate: 60,
                },
            },
	    {
                type: 'webrtc',
                video: {
                    contentType: 'video/H265',
                    width: 7680,
                    height: 4320,
                    bitrate: 5000000,
                    framerate: 60,
                },
            },
            {
                type: 'webrtc',
                video: {
                    contentType: 'video/H265',
                    width: 15360,
                    height: 8640,
                    bitrate: 5000000,
                    framerate: 60,
                },
            },
            {
                type: 'webrtc',
                video: {
                    contentType: 'video/av1',
                    width: 3840,
                    height: 2160,
                    bitrate: 500000,
                    framerate: 120,
                },
            },
            {
                type: 'webrtc',
                video: {
                    contentType: 'video/av1',
                    width: 3840,
                    height: 2160,
                    bitrate: 500000,
                    framerate: 60,
                },
            },
	    {
                type: 'webrtc',
                video: {
                    contentType: 'video/av1',
                    width: 7680,
                    height: 4320,
                    bitrate: 5000000,
                    framerate: 60,
                },
            },
        ];

        logDiv.innerHTML = "";
        configurations.forEach((config, index) => {
            navigator.mediaCapabilities.decodingInfo(config)
                .then((result) => {
			log(`Configuration: ${config.type}, ${config.video.contentType}, ${config.video.width}x${config.video.height}, ${config.video.framerate} fps`);
                    if (result.supported) {
                        log(`${config.video.contentType} decoding is supported.`);
                        log(`Power efficiency: ${result.powerEfficient}`);
                    } else {
                        log(`${config.video.contentType} decoding is not supported.`);
                    }
                    if (index < configurations.length - 1) {
                        logSeparator();
                    }
                })
                .catch((error) => {
                    log(`Error checking ${config.video.contentType} support: ${error}`);
                    if (index < configurations.length - 1) {
                        logSeparator();
                    }
                });
        });
    }
</script>

</body>

</html>
